{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Arcade</title>
    
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    
    <style>
        /* Basic reset and nav styling just for the base layout */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #edf2f7;
            color: #2d3748;
        }
        .navbar {
            background-color: #1a202c;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
        }
        .navbar-links a {
            color: #e2e8f0;
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
        }
        .navbar-links a:hover {
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="navbar-brand">🎲 Django Arcade</a>
        <div class="navbar-links">
            <a href="#">Games</a> 
            
            {% if request.user.is_authenticated %}
                <span>Welcome, {{ request.user.username }}!</span>
                <a href="#">Logout</a>
            {% else %}
                <a href="#">Login</a>
                <a href="#">Register</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
