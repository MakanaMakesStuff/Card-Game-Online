<div 
  id="{{ card_id }}" 
  class="w-32 h-48 md:w-40 md:h-56 perspective-1000 drop-shadow-xl"
>
  <div 
    class="card-inner relative w-full h-full preserve-3d transition-transform duration-500 ease-out"
  >
    
    <div 
      class="absolute inset-0 w-full h-full backface-hidden bg-slate-800 border-4 border-slate-300 rounded-xl flex items-center justify-center shadow-inner"
      style="background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px);"
    >
      <div class="w-16 h-16 bg-slate-200/20 rounded-full flex items-center justify-center border-2 border-slate-300/50">
        <span class="text-3xl opacity-80">⚔️</span>
      </div>
    </div>

    <div 
      class="absolute inset-0 w-full h-full backface-hidden rotate-y-180 bg-white border-2 border-gray-200 rounded-xl shadow-md flex flex-col p-3"
    >
      <div class="text-left leading-none font-bold text-lg md:text-xl text-gray-800">
        {{ card_display|safe }}
      </div>
      
      <div class="flex-1 flex items-center justify-center text-4xl md:text-5xl font-black text-gray-800">
        {{ card_display|safe }}
      </div>

      <div class="text-right leading-none font-bold text-lg md:text-xl text-gray-800 rotate-180">
        {{ card_display|safe }}
      </div>
    </div>
    
  </div>
</div>
